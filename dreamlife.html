<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NO DREAM</title>
    <style>
        * {
            box-sizing: border-box;
        }
        
        body {
            background-color: #0f0202; /* Deep, near-black red */
            color: #ffffff;
            font-family: 'Arial Black', Impact, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            overflow: hidden;
        }

        /* Ambient flashing background effect */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle, rgba(255, 0, 0, 0.15) 0%, transparent 70%);
            animation: ambientPulse 4s infinite ease-in-out;
            z-index: 1;
        }

        .warning-card {
            position: relative;
            z-index: 2;
            text-align: center;
            background-color: #1a0505;
            border: 5px solid #ff3333;
            border-radius: 15px;
            padding: 50px 40px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 0 30px rgba(255, 51, 51, 0.4);
            animation: borderPulse 2s infinite ease-in-out;
        }

        .hazard-lines {
            height: 15px;
            background: repeating-linear-gradient(
                -45deg,
                #ffcc00,
                #ffcc00 10px,
                #1a0505 10px,
                #1a0505 20px
            );
            border-radius: 5px;
            margin-bottom: 30px;
        }

        .warning-icon {
            font-size: 80px;
            color: #ffcc00;
            margin-bottom: 10px;
            display: inline-block;
            animation: iconBlink 1s infinite alternate steps(2);
        }

        h1 {
            color: #ff3333;
            font-size: 2.5rem;
            margin: 0 0 20px 0;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(255, 51, 51, 0.6);
        }

        .message {
            color: #ffffff;
            font-size: 2rem;
            line-height: 1.4;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
            word-wrap: break-word;
        }

        /* Animations */
        @keyframes borderPulse {
            0% { 
                box-shadow: 0 0 30px rgba(255, 51, 51, 0.4); 
                border-color: #ff3333;
            }
            50% { 
                box-shadow: 0 0 50px rgba(255, 51, 51, 0.8); 
                border-color: #ff6666;
            }
            100% { 
                box-shadow: 0 0 30px rgba(255, 51, 51, 0.4); 
                border-color: #ff3333;
            }
        }

        @keyframes ambientPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        @keyframes iconBlink {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.05); opacity: 0.8; }
        }
    </style>
</head>
<body>

    <div class="warning-card">
        <div class="hazard-lines"></div>
        <div class="warning-icon">⚠️</div>
        <h1>избегайте псевдопсихологов и шарлатанов</h1>
        <p class="message">Шарлатаны и лжеэкстрасенсы — отличные манипуляторы. Они видят чужую боль и используют её, чтобы продать вам иллюзию спасения.</p>
        <div class="hazard-lines" style="margin-top: 30px; margin-bottom: 0;"></div>
    </div>

</body>
</html>
